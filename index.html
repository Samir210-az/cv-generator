<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional CV Generator – 3 dil, 3 format</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #1e2a3a;
        }
        .app {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1.1fr;
            gap: 24px;
            align-items: start;
        }
        .form-panel {
            background: #fff;
            border-radius: 20px;
            padding: 24px 28px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            border: 1px solid #e6edf4;
            position: relative;
        }
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 24px;
            display: flex;
            gap: 6px;
        }
        .lang-selector button {
            background: #eef4fc;
            border: 1px solid #d0dbe8;
            border-radius: 30px;
            padding: 4px 14px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            color: #2c3e5a;
        }
        .lang-selector button.active {
            background: #1a3a6a;
            color: #fff;
            border-color: #1a3a6a;
        }
        .form-panel h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            margin-right: 120px;
            color: #0b1a2e;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: #2c3e5a;
            margin-bottom: 4px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0dbe8;
            border-radius: 10px;
            font-size: 0.95rem;
            background: #fafcff;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #2a5c8a;
            box-shadow: 0 0 0 3px rgba(42,92,138,0.1);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .dynamic-section {
            border-top: 1px solid #e6edf4;
            padding-top: 16px;
            margin-top: 16px;
        }
        .dynamic-section .section-title {
            font-weight: 600;
            font-size: 1rem;
            color: #1a2a44;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dynamic-entry {
            background: #f8faff;
            padding: 16px 14px;
            border-radius: 14px;
            margin-bottom: 14px;
            border: 1px solid #e6edf4;
            position: relative;
        }
        .dynamic-entry .remove-btn {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: #b0c0d0;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .dynamic-entry .remove-btn:hover { color: #c0392b; }
        .add-btn {
            background: #e9eff6;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
            color: #1a3a6a;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .add-btn:hover { background: #d0def0; }
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .tag-group .tag {
            background: #e9eff6;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tag-group .tag .remove-tag { cursor: pointer; color: #888; font-weight: 700; }
        .tag-group input {
            flex: 1;
            min-width: 120px;
            padding: 6px 12px;
            border: 1px solid #d0dbe8;
            border-radius: 40px;
            font-size: 0.85rem;
        }
        .tag-group .add-tag-btn {
            background: #2a5c8a;
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 24px;
            border-top: 1px solid #e6edf4;
            padding-top: 20px;
        }
        .btn-group button {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .btn-word { background: #2b5797; color: #fff; }
        .btn-word:hover { background: #1d3f6e; }
        .btn-pdf { background: #c0392b; color: #fff; }
        .btn-pdf:hover { background: #922b21; }
        .btn-clear { background: #e6edf4; color: #2c3e5a; }
        .btn-clear:hover { background: #d0dbe8; }

        .preview-panel {
            background: #fff;
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            border: 1px solid #e6edf4;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        .preview-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .preview-panel h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0b1a2e;
        }

        /* ---- Format seçici (1 düymə ilə keçid) ---- */
        .template-switch {
            display: flex;
            gap: 6px;
            background: #eef2f7;
            border-radius: 40px;
            padding: 4px;
        }
        .template-switch button {
            border: none;
            background: transparent;
            padding: 7px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: #3d5570;
            transition: 0.2s;
            white-space: nowrap;
        }
        .template-switch button.active {
            background: #1a3a6a;
            color: #fff;
        }

        #cvPreview {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e6edf4;
            font-size: 0.9rem;
            line-height: 1.5;
            overflow: hidden;
        }

        /* =========================================================
           TEMPLATE 1 — MODERN (rəngli, dəyirmi avatar)
           ========================================================= */
        #cvPreview.tpl-modern { padding: 20px; }
        #cvPreview.tpl-modern .cv-header {
            display: flex;
            gap: 20px;
            align-items: center;
            border-bottom: 2px solid #e6edf4;
            padding-bottom: 16px;
            margin-bottom: 16px;
        }
        #cvPreview.tpl-modern .cv-avatar,
        #cvPreview.tpl-modern .cv-avatar-placeholder {
            width: 80px; height: 80px; border-radius: 50%;
            object-fit: cover; background: #e6edf4;
            border: 2px solid #c0d0e0; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            color: #5d7188; font-size: 0.7rem;
        }
        #cvPreview.tpl-modern .cv-name { font-size: 1.6rem; font-weight: 700; color: #0b1a2e; }
        #cvPreview.tpl-modern .cv-title { color: #2a5c8a; font-weight: 500; }
        #cvPreview.tpl-modern .cv-section { margin-top: 14px; }
        #cvPreview.tpl-modern .cv-section h4 {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;
            color: #5d7188; border-bottom: 1px solid #e6edf4;
            padding-bottom: 4px; margin-bottom: 8px;
        }
        #cvPreview.tpl-modern .cv-item { margin-bottom: 6px; }
        #cvPreview.tpl-modern .cv-item strong { color: #0b1a2e; }
        #cvPreview.tpl-modern .cv-tags { display: flex; flex-wrap: wrap; gap: 4px 8px; }
        #cvPreview.tpl-modern .cv-tags span {
            background: #eef4fc; padding: 0 12px; border-radius: 40px;
            font-size: 0.8rem; color: #1a3a6a;
        }

        /* =========================================================
           TEMPLATE 2 — KLASSİK / ATS-FRIENDLY (ağ-qara, 1 sütun, serif)
           Ən çox HR sistemlərində seçilən, tarama-dostu format
           ========================================================= */
        #cvPreview.tpl-classic { padding: 28px 32px; font-family: 'Georgia', 'Times New Roman', serif; color: #111; }
        #cvPreview.tpl-classic .cv-header {
            text-align: center;
            border-bottom: 2px solid #111;
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        #cvPreview.tpl-classic .cv-avatar,
        #cvPreview.tpl-classic .cv-avatar-placeholder { display: none; }
        #cvPreview.tpl-classic .cv-name { font-size: 1.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        #cvPreview.tpl-classic .cv-title { font-size: 0.95rem; color: #333; margin-top: 2px; }
        #cvPreview.tpl-classic .cv-section { margin-top: 14px; }
        #cvPreview.tpl-classic .cv-section h4 {
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;
            border-bottom: 1px solid #111; padding-bottom: 3px; margin-bottom: 8px; font-weight: 700;
        }
        #cvPreview.tpl-classic .cv-item { margin-bottom: 6px; }
        #cvPreview.tpl-classic .cv-item strong { color: #000; }
        #cvPreview.tpl-classic .cv-tags { display: block; }
        #cvPreview.tpl-classic .cv-tags span {
            display: inline; background: none; padding: 0; border-radius: 0;
            font-size: 0.9rem; color: #111;
        }
        #cvPreview.tpl-classic .cv-tags span::after { content: " • "; color: #888; }
        #cvPreview.tpl-classic .cv-tags span:last-child::after { content: ""; }

        /* =========================================================
           TEMPLATE 3 — CREATIVE / SIDEBAR (yan panel rəngli)
           ========================================================= */
        #cvPreview.tpl-sidebar { display: grid; grid-template-columns: 34% 66%; min-height: 100%; }
        #cvPreview.tpl-sidebar .cv-sidebar {
            background: #243b53; color: #fff; padding: 26px 20px;
        }
        #cvPreview.tpl-sidebar .cv-main { padding: 26px 22px; }
        #cvPreview.tpl-sidebar .cv-avatar,
        #cvPreview.tpl-sidebar .cv-avatar-placeholder {
            width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3); margin: 0 auto 14px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); color: #cfd8e3; font-size: 0.7rem;
        }
        #cvPreview.tpl-sidebar .cv-name { font-size: 1.25rem; font-weight: 700; text-align: center; }
        #cvPreview.tpl-sidebar .cv-title { font-size: 0.85rem; text-align: center; color: #9fb3c8; margin-bottom: 14px; }
        #cvPreview.tpl-sidebar .cv-section { margin-top: 16px; }
        #cvPreview.tpl-sidebar .cv-sidebar .cv-section h4 {
            font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
            color: #9fb3c8; border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 4px; margin-bottom: 8px;
        }
        #cvPreview.tpl-sidebar .cv-sidebar .cv-item { font-size: 0.85rem; margin-bottom: 6px; color: #e8edf2; }
        #cvPreview.tpl-sidebar .cv-sidebar .cv-item strong { color: #fff; }
        #cvPreview.tpl-sidebar .cv-main .cv-section h4 {
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;
            color: #243b53; border-bottom: 2px solid #243b53;
            padding-bottom: 4px; margin-bottom: 8px;
        }
        #cvPreview.tpl-sidebar .cv-main .cv-item { margin-bottom: 6px; }
        #cvPreview.tpl-sidebar .cv-main .cv-item strong { color: #111; }
        #cvPreview.tpl-sidebar .cv-tags { display: flex; flex-wrap: wrap; gap: 4px 6px; }
        #cvPreview.tpl-sidebar .cv-sidebar .cv-tags span {
            background: rgba(255,255,255,0.12); padding: 2px 10px; border-radius: 30px; font-size: 0.75rem;
        }

        .text-muted { color: #6a7e99; font-size: 0.8rem; }
        .mt-1 { margin-top: 6px; }
        .flex { display: flex; gap: 8px; align-items: center; }
        .flex-wrap { flex-wrap: wrap; }
        .gap-2 { gap: 12px; }

        /* ---- Footer ---- */
        .site-footer {
            max-width: 1400px;
            margin: 28px auto 0;
            text-align: center;
            font-size: 0.85rem;
            color: #6a7e99;
            padding-top: 16px;
            border-top: 1px solid #e0e6ed;
        }
        .site-footer a {
            color: #1a3a6a;
            font-weight: 600;
            text-decoration: none;
        }
        .site-footer a:hover { text-decoration: underline; }

        @media (max-width: 900px) {
            .app { grid-template-columns: 1fr; gap: 20px; }
            .preview-panel { position: static; max-height: none; }
            .form-row { grid-template-columns: 1fr; }
            .lang-selector { top: 16px; right: 16px; }
            .form-panel h2 { margin-right: 100px; }
            #cvPreview.tpl-sidebar { grid-template-columns: 1fr; }
        }
        @media print {
            .form-panel, .btn-group, .preview-panel h2, .lang-selector, .template-switch, .site-footer { display: none !important; }
            .preview-panel { border: none !important; box-shadow: none !important; padding: 0 !important; }
            #cvPreview { border: none !important; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="form-panel">
        <!-- Dil seçicisi -->
        <div class="lang-selector">
            <button data-lang="az" class="active" onclick="setLanguage('az')">AZ</button>
            <button data-lang="en" onclick="setLanguage('en')">EN</button>
            <button data-lang="ru" onclick="setLanguage('ru')">RU</button>
        </div>

        <h2 id="formTitle">📝 CV Məlumatları</h2>

        <!-- Şəxsi məlumatlar -->
        <div class="form-row">
            <div class="form-group">
                <label id="lblFirstName">Ad</label>
                <input type="text" id="firstName" placeholder="Ad" />
            </div>
            <div class="form-group">
                <label id="lblLastName">Soyad</label>
                <input type="text" id="lastName" placeholder="Soyad" />
            </div>
        </div>
        <div class="form-group">
            <label id="lblFatherName">Ata adı (isteğe bağlı)</label>
            <input type="text" id="fatherName" placeholder="Ata adı" />
        </div>
        <div class="form-row">
            <div class="form-group">
                <label id="lblJobTitle">Vəzifə / Başlıq</label>
                <input type="text" id="jobTitle" placeholder="Məs. HSE Manager" />
            </div>
            <div class="form-group">
                <label id="lblBirthDate">Doğum tarixi</label>
                <input type="date" id="birthDate" />
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label id="lblPhone">Telefon</label>
                <input type="text" id="phone" placeholder="+994 55 555 55 55" />
            </div>
            <div class="form-group">
                <label id="lblEmail">Email</label>
                <input type="email" id="email" placeholder="email@example.com" />
            </div>
        </div>
        <div class="form-group">
            <label id="lblAddress">Ünvan</label>
            <input type="text" id="address" placeholder="Baku, Azərbaycan" />
        </div>
        <div class="form-group">
            <label id="lblAvatar">Şəkil yüklə (PNG, JPG)</label>
            <input type="file" id="avatarUpload" accept="image/*" />
        </div>

        <!-- Təhsil -->
        <div class="dynamic-section" id="educationSection">
            <div class="section-title">
                <span id="eduTitle">🎓 Təhsil</span>
                <button class="add-btn" onclick="addEducation()" id="eduAddBtn">+ Əlavə et</button>
            </div>
            <div id="educationContainer"></div>
        </div>

        <!-- İş təcrübəsi -->
        <div class="dynamic-section" id="experienceSection">
            <div class="section-title">
                <span id="expTitle">💼 İş təcrübəsi</span>
                <button class="add-btn" onclick="addExperience()" id="expAddBtn">+ Əlavə et</button>
            </div>
            <div id="experienceContainer"></div>
        </div>

        <!-- Dillər -->
        <div class="dynamic-section" id="languageSection">
            <div class="section-title">
                <span id="langTitle">🌐 Dillər</span>
                <button class="add-btn" onclick="addLanguage()" id="langAddBtn">+ Əlavə et</button>
            </div>
            <div id="languageContainer"></div>
        </div>

        <!-- Sertifikatlar -->
        <div class="dynamic-section" id="certificateSection">
            <div class="section-title">
                <span id="certTitle">📜 Sertifikatlar</span>
                <button class="add-btn" onclick="addCertificate()" id="certAddBtn">+ Əlavə et</button>
            </div>
            <div id="certificateContainer"></div>
        </div>

        <!-- Bacarıqlar -->
        <div class="dynamic-section">
            <div class="section-title">
                <span id="skillTitle">⭐ Bacarıq / Keyfiyyət</span>
            </div>
            <div class="form-group">
                <div class="tag-group" id="skillsGroup">
                    <input type="text" id="skillInput" placeholder="Yeni bacarıq..." />
                    <button class="add-tag-btn" onclick="addSkill()" id="skillAddBtn">Əlavə et</button>
                </div>
                <div class="flex flex-wrap gap-2" id="skillTagsContainer" style="margin-top:8px;"></div>
            </div>
        </div>

        <!-- Düymələr -->
        <div class="btn-group">
            <button class="btn-word" onclick="exportWord()" id="btnWord">📄 Word yüklə</button>
            <button class="btn-pdf" onclick="exportPDF()" id="btnPdf">📑 PDF yüklə</button>
            <button class="btn-clear" onclick="clearAll()" id="btnClear">🗑 Bütün məlumatları təmizlə</button>
        </div>
        <div class="text-muted mt-1" id="storageInfo">Məlumatlar avtomatik olaraq lokal yaddaşda saxlanılır.</div>
    </div>

    <!-- Önizləmə -->
    <div class="preview-panel">
        <div class="preview-panel-header">
            <h2 id="previewTitle">👁 Canlı Önizləmə</h2>
            <div class="template-switch" id="templateSwitch">
                <button data-tpl="modern" class="active" onclick="setTemplate('modern')" id="tplBtnModern">Modern</button>
                <button data-tpl="classic" onclick="setTemplate('classic')" id="tplBtnClassic">Klassik</button>
                <button data-tpl="sidebar" onclick="setTemplate('sidebar')" id="tplBtnSidebar">Creative</button>
            </div>
        </div>
        <div id="cvPreview" class="tpl-modern"></div>
    </div>
</div>

<div class="site-footer">
    By <a href="https://instagram.com/s_akhundoff" target="_blank" rel="noopener">@s_akhundoff</a>
</div>

    // ----- Yaddaş və məlumat idarəsi -----
    function loadFromStorage() {
        const data = localStorage.getItem('cvData');
        if (data) {
            try {
                const parsed = JSON.parse(data);
                document.getElementById('firstName').value = parsed.firstName || '';
                document.getElementById('lastName').value = parsed.lastName || '';
                document.getElementById('fatherName').value = parsed.fatherName || '';
                document.getElementById('jobTitle').value = parsed.jobTitle || '';
                document.getElementById('birthDate').value = parsed.birthDate || '';
                document.getElementById('phone').value = parsed.phone || '';
                document.getElementById('email').value = parsed.email || '';
                document.getElementById('address').value = parsed.address || '';
                if (parsed.avatar) window.avatarData = parsed.avatar;
                if (parsed.educations) {
                    document.getElementById('educationContainer').innerHTML = '';
                    parsed.educations.forEach(edu => addEducation(edu, false));
                }
                if (parsed.experiences) {
                    document.getElementById('experienceContainer').innerHTML = '';
                    parsed.experiences.forEach(exp => addExperience(exp, false));
                }
                if (parsed.languages) {
                    document.getElementById('languageContainer').innerHTML = '';
                    parsed.languages.forEach(lang => addLanguage(lang, false));
                }
                if (parsed.certificates) {
                    document.getElementById('certificateContainer').innerHTML = '';
                    parsed.certificates.forEach(cert => addCertificate(cert, false));
                }
                if (parsed.skills) {
                    window.skills = parsed.skills;
                    renderSkillTags();
                } else {
                    window.skills = [];
                }
                if (parsed.template) {
                    currentTemplate = parsed.template;
                }
                if (parsed.lang) setLanguage(parsed.lang);
            } catch(e) { console.warn(e); }
        } else {
            window.skills = ['Məsuliyyətli', 'Komanda işi', 'Liderlik'];
            renderSkillTags();
            addEducation({ school: 'Baku State University', major: 'Geology', start: '2015', end: '2019' }, false);
            addExperience({ company: 'INPROCON – Crescent SOCAR', role: 'HSE Manager', start: '2026', end: 'present', desc: 'ADEC 048-049 Restaurant Project' }, false);
            addLanguage({ name: 'Azərbaycan', level: 'Ana dili' }, false);
            addCertificate({ name: 'IOSH International OHS', org: 'IOSH', year: '2023' }, false);
        }
        // template düymələrini sinxronlaşdır
        document.querySelectorAll('.template-switch button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.tpl === currentTemplate);
        });
        updateAllLabels();
        updateDynamicPlaceholders();
        updatePreview();
    }

    function saveToStorage() {
        const data = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            fatherName: document.getElementById('fatherName').value,
            jobTitle: document.getElementById('jobTitle').value,
            birthDate: document.getElementById('birthDate').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            address: document.getElementById('address').value,
            avatar: window.avatarData || null,
            educations: getEducations(),
            experiences: getExperiences(),
            languages: getLanguages(),
            certificates: getCertificates(),
            skills: window.skills || [],
            lang: currentLang,
            template: currentTemplate
        };
        localStorage.setItem('cvData', JSON.stringify(data));
    }

    function createDynamicEntry(html, data, saveAndUpdate = true) {
        const wrapper = document.createElement('div');
        wrapper.className = 'dynamic-entry';
        wrapper.innerHTML = html;
        wrapper.querySelectorAll('input, textarea').forEach(inp => {
            inp.addEventListener('input', () => { if (saveAndUpdate) { saveToStorage(); updatePreview(); } });
        });
        return wrapper;
    }

    window.skills = [];
    function renderSkillTags() {
        const container = document.getElementById('skillTagsContainer');
        container.innerHTML = '';
        window.skills.forEach((skill, index) => {
            const span = document.createElement('span');
            span.className = 'tag';
            span.innerHTML = `${skill} <span class="remove-tag" data-index="${index}">✕</span>`;
            span.querySelector('.remove-tag').addEventListener('click', function() {
                const idx = parseInt(this.dataset.index);
                window.skills.splice(idx, 1);
                renderSkillTags();
                saveToStorage();
                updatePreview();
            });
            container.appendChild(span);
        });
    }

    window.addSkill = function() {
        const input = document.getElementById('skillInput');
        const val = input.value.trim();
        if (val) {
            window.skills.push(val);
            input.value = '';
            renderSkillTags();
            saveToStorage();
            updatePreview();
        }
    };
    document.getElementById('skillInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); window.addSkill(); }
    });

    document.getElementById('avatarUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(ev) {
                window.avatarData = ev.target.result;
                saveToStorage();
                updatePreview();
            };
            reader.readAsDataURL(file);
        }
    });

    // ----- Önizləmə (3 formata uyğun render) -----
    function buildAvatarHtml(avatar) {
        return avatar
            ? `<img src="${avatar}" class="cv-avatar" alt="avatar" />`
            : `<div class="cv-avatar-placeholder">📷</div>`;
    }

    function updatePreview() {
        const preview = document.getElementById('cvPreview');
        preview.className = 'tpl-' + currentTemplate;
        const t = LANG[currentLang];
        const firstName = document.getElementById('firstName').value || 'Ad';
        const lastName = document.getElementById('lastName').value || 'Soyad';
        const fatherName = document.getElementById('fatherName').value;
        const jobTitle = document.getElementById('jobTitle').value || 'Vəzifə';
        const birthDate = document.getElementById('birthDate').value;
        const phone = document.getElementById('phone').value || '';
        const email = document.getElementById('email').value || '';
        const address = document.getElementById('address').value || '';
        const avatar = window.avatarData || null;

        const educations = getEducations();
        const experiences = getExperiences();
        const languages = getLanguages();
        const certificates = getCertificates();
        const skills = window.skills || [];

        const contactBlock = (phone || email || address) ? `
            <div class="cv-section"><h4>${t.cvContact}</h4>
                ${phone ? `<div class="cv-item">📞 ${phone}</div>` : ''}
                ${email ? `<div class="cv-item">✉️ ${email}</div>` : ''}
                ${address ? `<div class="cv-item">📍 ${address}</div>` : ''}
            </div>` : '';

        const educationBlock = educations.length ? `
            <div class="cv-section"><h4>${t.cvEducation}</h4>
                ${educations.map(edu => `
                    <div class="cv-item"><strong>${edu.school || 'Məktəb'}</strong>${edu.major ? ', ' + edu.major : ''}${(edu.start || edu.end) ? ` (${edu.start || ''}${edu.start && edu.end ? ' – ' : ''}${edu.end || ''})` : ''}</div>
                `).join('')}
            </div>` : '';

        const experienceBlock = experiences.length ? `
            <div class="cv-section"><h4>${t.cvExperience}</h4>
                ${experiences.map(exp => `
                    <div class="cv-item"><strong>${exp.company || 'Şirkət'}</strong> – ${exp.role || 'Vəzifə'}${(exp.start || exp.end) ? ` (${exp.start || ''}${exp.start && exp.end ? ' – ' : ''}${exp.end || ''})` : ''}</div>
                    ${exp.desc ? `<div style="font-size:0.85rem; margin-bottom:4px; opacity:0.85;">${exp.desc}</div>` : ''}
                `).join('')}
            </div>` : '';

        const languagesBlock = languages.length ? `
            <div class="cv-section"><h4>${t.cvLanguages}</h4>
                ${languages.map(lang => `<div class="cv-item"><strong>${lang.name || 'Dil'}</strong> – ${lang.level || 'Səviyyə'}</div>`).join('')}
            </div>` : '';

        const certificatesBlock = certificates.length ? `
            <div class="cv-section"><h4>${t.cvCertificates}</h4>
                ${certificates.map(cert => `<div class="cv-item"><strong>${cert.name || 'Sertifikat'}</strong>${cert.org ? ', ' + cert.org : ''}${cert.year ? ` (${cert.year})` : ''}</div>`).join('')}
            </div>` : '';

        const skillsBlock = skills.length ? `
            <div class="cv-section"><h4>${t.cvSkills}</h4>
                <div class="cv-tags">${skills.map(s => `<span>${s}</span>`).join('')}</div>
            </div>` : '';

        let html = '';

        if (currentTemplate === 'sidebar') {
            // Creative — yan panel (əlaqə/dillər/bacarıqlar), sağda təcrübə/təhsil/sertifikat
            html += `<div class="cv-sidebar">`;
            html += buildAvatarHtml(avatar);
            html += `<div class="cv-name">${firstName} ${lastName}${fatherName ? ' ' + fatherName : ''}</div>`;
            html += `<div class="cv-title">${jobTitle}</div>`;
            html += contactBlock;
            html += languagesBlock;
            html += skillsBlock;
            html += `</div>`;
            html += `<div class="cv-main">`;
            if (birthDate) html += `<div class="text-muted" style="font-size:0.8rem;">📅 ${birthDate}</div>`;
            html += experienceBlock;
            html += educationBlock;
            html += certificatesBlock;
            html += `</div>`;
        } else {
            // Modern & Klassik — eyni struktur, fərqli CSS skin
            html += `<div class="cv-header">`;
            if (currentTemplate === 'modern') html += buildAvatarHtml(avatar);
            html += `<div><div class="cv-name">${firstName} ${lastName}${fatherName ? ' ' + fatherName : ''}</div>`;
            html += `<div class="cv-title">${jobTitle}</div>`;
            if (birthDate) html += `<div class="text-muted" style="font-size:0.8rem;">📅 ${birthDate}</div>`;
            html += `</div></div>`;
            html += contactBlock;
            html += educationBlock;
            html += experienceBlock;
            html += languagesBlock;
            html += certificatesBlock;
            html += skillsBlock;
        }

        preview.innerHTML = html;
    }

    // ----- İxrac -----
    window.exportWord = function() {
        const content = document.getElementById('cvPreview').outerHTML;
        const style = document.querySelector('style').innerHTML;
        const fullHtml = `
            <!DOCTYPE html>
            <html>
            <head><meta charset="UTF-8"><style>${style}</style></head>
            <body style="padding:20px; background:#fff;">${content}</body>
            </html>
        `;
        const blob = new Blob([fullHtml], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'CV.doc';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };

    window.exportPDF = function() {
        const element = document.getElementById('cvPreview');
        const opt = {
            margin: [0.5, 0.5, 0.5, 0.5],
            filename: 'CV.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, letterRendering: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    };

            document.getElementById('experienceContainer').innerHTML = '';
            document.getElementById('languageContainer').innerHTML = '';
            document.getElementById('certificateContainer').innerHTML = '';
            window.skills = [];
            renderSkillTags();

    };

    document.querySelectorAll('#firstName, #lastName, #fatherName, #jobTitle, #birthDate, #phone, #email, #address').forEach(el => {
        el.addEventListener('input', () => { saveToStorage(); updatePreview(); });
    });

    loadFromStorage();
    document.querySelectorAll('.lang-selector button').forEach(btn => {
        btn.addEventListener('click', function() {
            setLanguage(this.dataset.lang);
        });
    });
</script>

</body>
</html>
