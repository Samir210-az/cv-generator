<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Professional CV Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&family=Lora:ital@0;1&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', system-ui, sans-serif;
    background: linear-gradient(135deg,#f4f7fb 0%,#eef1f8 100%);
    padding: 24px;
    color: #1a2433;
}
.app {
    max-width: 1440px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.15fr;
    gap: 26px;
    align-items: start;
}
.form-panel {
    background: #fff;
    border-radius: 22px;
    padding: 28px 30px;
    box-shadow: 0 10px 40px rgba(20,40,70,0.07);
    border: 1px solid #e9eef5;
    position: relative;
}
.lang-selector { position: absolute; top: 22px; right: 26px; display: flex; gap: 6px; }
.lang-selector button {
    background: #f0f4fa; border: 1px solid #dbe4f0; border-radius: 30px;
    padding: 5px 14px; font-weight: 700; font-size: 0.78rem; cursor: pointer;
    transition: 0.2s; color: #344b6e; letter-spacing: 0.5px;
}
.lang-selector button.active { background: #16213f; color: #fff; border-color: #16213f; }
.form-panel h2 { font-size: 1.55rem; font-weight: 800; margin-bottom: 22px; margin-right: 120px; color: #0c1526; letter-spacing: -0.5px; }
.form-group { margin-bottom: 18px; }
.form-group label { display:block; font-weight: 600; font-size: 0.82rem; color: #45597c; margin-bottom: 5px; }
.form-group input, .form-group textarea {
    width: 100%; padding: 11px 13px; border: 1.5px solid #dbe4f0; border-radius: 11px;
    font-size: 0.95rem; background: #fbfcfe; transition: 0.2s; font-family: inherit;
}
.form-group input:focus, .form-group textarea:focus {
    outline: none; border-color: #3a6df0; box-shadow: 0 0 0 4px rgba(58,109,240,0.1);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.dynamic-section { border-top: 1px solid #eef1f7; padding-top: 18px; margin-top: 18px; }
.dynamic-section .section-title { font-weight: 700; font-size: 1.02rem; color: #16213f; margin-bottom: 12px; display:flex; justify-content:space-between; align-items:center; }
.dynamic-entry { background: #f7f9fd; padding: 18px 16px; border-radius: 16px; margin-bottom: 14px; border: 1px solid #e9eef5; position: relative; }
.dynamic-entry .remove-btn { position:absolute; top:10px; right:12px; background:none; border:none; color:#b3c0d4; font-size:1.2rem; cursor:pointer; }
.dynamic-entry .remove-btn:hover { color:#e0524a; }
.add-btn { background:#e8edfb; border:none; padding:7px 18px; border-radius:40px; font-weight:600; color:#2c4dc9; cursor:pointer; font-size:0.88rem; transition:0.2s; }
.add-btn:hover { background:#d7dffa; }
.tag-group { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
.tag-group .tag { background:#e8edfb; padding:5px 14px; border-radius:40px; font-size:0.85rem; display:flex; align-items:center; gap:6px; color:#2c4dc9; font-weight:500; }
.tag-group .tag .remove-tag { cursor:pointer; color:#7c8db8; font-weight:700; }
.tag-group input { flex:1; min-width:120px; padding:7px 14px; border:1.5px solid #dbe4f0; border-radius:40px; font-size:0.85rem; }
.tag-group .add-tag-btn { background:#16213f; color:#fff; border:none; padding:7px 18px; border-radius:40px; cursor:pointer; font-size:0.85rem; font-weight:600; }
.btn-group { display:flex; flex-wrap:wrap; gap:12px; margin-top:26px; border-top:1px solid #eef1f7; padding-top:22px; }
.btn-group button { padding:12px 26px; border:none; border-radius:40px; font-weight:700; cursor:pointer; transition:0.2s; font-size:0.92rem; display:flex; align-items:center; gap:6px; }
.btn-word { background:#2c4dc9; color:#fff; box-shadow:0 6px 16px rgba(44,77,201,0.25); }
.btn-word:hover { background:#21399c; }
.btn-pdf { background:#d1372f; color:#fff; box-shadow:0 6px 16px rgba(209,55,47,0.25); }
.btn-pdf:hover { background:#aa2b25; }
.btn-clear { background:#eef1f7; color:#45597c; }
.btn-clear:hover { background:#dde4f0; }
.btn-group button:disabled { opacity:0.6; cursor:wait; }

.preview-panel {
    background:#fff; border-radius:22px; padding:22px 26px;
    box-shadow:0 10px 40px rgba(20,40,70,0.07); border:1px solid #e9eef5;
    position:sticky; top:24px; max-height: calc(100vh - 48px); overflow-y:auto;
}
.preview-panel-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:18px; }
.preview-panel h2 { font-size:1.15rem; font-weight:800; color:#0c1526; }
.template-switch { display:flex; gap:6px; background:#f0f4fa; border-radius:40px; padding:4px; }
.template-switch button { border:none; background:transparent; padding:8px 16px; border-radius:30px; font-size:0.8rem; font-weight:700; cursor:pointer; color:#45597c; transition:0.2s; white-space:nowrap; }
.template-switch button.active { background:#16213f; color:#fff; }

#cvPreviewWrap { border-radius:14px; overflow:hidden; box-shadow:0 2px 18px rgba(20,40,70,0.08); }
#cvPreview { background:#fff; font-size:0.92rem; line-height:1.55; }

.tpl-modern { font-family:'Poppins', sans-serif; }
.tpl-modern .cv-topbar { background:#16213f; height:14px; }
.tpl-modern .cv-header { display:flex; gap:22px; align-items:center; padding:26px 30px 20px; }
.tpl-modern .cv-avatar, .tpl-modern .cv-avatar-placeholder { width:92px; height:92px; border-radius:50%; object-fit:cover; border:4px solid #eef1f7; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:#eef1f7; color:#8b9bb8; font-size:0.7rem; }
.tpl-modern .cv-name { font-size:1.7rem; font-weight:800; color:#0c1526; }
.tpl-modern .cv-title { color:#2c4dc9; font-weight:600; font-size:1rem; margin-top:2px; }
.tpl-modern .cv-body { padding:6px 30px 28px; }
.tpl-modern .cv-section { margin-top:18px; }
.tpl-modern .cv-section h4 { font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:#2c4dc9; border-bottom:2px solid #e8edfb; padding-bottom:6px; margin-bottom:10px; }
.tpl-modern .cv-item { margin-bottom:8px; }
.tpl-modern .cv-item strong { color:#0c1526; font-size:0.96rem; }
.tpl-modern .cv-item .meta { color:#8b9bb8; font-size:0.82rem; }
.tpl-modern .cv-tags span { background:#eef1f7; padding:5px 14px; border-radius:40px; font-size:0.82rem; color:#16213f; font-weight:500; margin:0 6px 6px 0; display:inline-block; }

.tpl-classic { font-family:'Lora', Georgia, serif; color:#1a1a1a; }
.tpl-classic .cv-header { text-align:center; padding:34px 36px 18px; border-bottom:3px solid #1a1a1a; }
.tpl-classic .cv-name { font-family:'Playfair Display', serif; font-size:2rem; font-weight:700; letter-spacing:1px; }
.tpl-classic .cv-title { font-size:1rem; color:#444; margin-top:4px; letter-spacing:0.5px; text-transform:uppercase; }
.tpl-classic .cv-body { padding:22px 36px 32px; }
.tpl-classic .cv-section { margin-top:18px; }
.tpl-classic .cv-section h4 { font-size:0.86rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; border-bottom:1.5px solid #1a1a1a; padding-bottom:4px; margin-bottom:10px; }
.tpl-classic .cv-item { margin-bottom:8px; }
.tpl-classic .cv-item strong { color:#000; }
.tpl-classic .cv-item .meta { color:#555; font-size:0.85rem; font-style:italic; }
.tpl-classic .cv-tags span { font-size:0.92rem; }
.tpl-classic .cv-tags span:not(:last-child)::after { content:" •  "; color:#999; }

.tpl-sidebar { font-family:'Inter', sans-serif; }
.tpl-sidebar table.cv-shell { width:100%; border-collapse:collapse; }
.tpl-sidebar td.cv-sidebar { background:#1f2a44; color:#fff; padding:34px 24px; width:34%; vertical-align:top; }
.tpl-sidebar td.cv-main { padding:34px 28px; vertical-align:top; }
.tpl-sidebar .cv-avatar, .tpl-sidebar .cv-avatar-placeholder { width:104px; height:104px; border-radius:50%; object-fit:cover; border:4px solid rgba(255,255,255,0.25); margin:0 auto 16px; display:block; }
.tpl-sidebar .cv-avatar-placeholder { display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.1); color:#c4cee0; font-size:0.7rem; }
.tpl-sidebar .cv-name { font-size:1.3rem; font-weight:800; text-align:center; }
.tpl-sidebar .cv-title { font-size:0.85rem; text-align:center; color:#9fb0d6; margin-bottom:18px; }
.tpl-sidebar .cv-section { margin-top:20px; }
.tpl-sidebar td.cv-sidebar .cv-section h4 { font-size:0.74rem; text-transform:uppercase; letter-spacing:1px; color:#9fb0d6; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:5px; margin-bottom:10px; font-weight:700; }
.tpl-sidebar td.cv-sidebar .cv-item { font-size:0.85rem; margin-bottom:7px; color:#dde3f0; }
.tpl-sidebar td.cv-sidebar .cv-item strong { color:#fff; }
.tpl-sidebar td.cv-main .cv-section h4 { font-size:0.82rem; text-transform:uppercase; letter-spacing:0.8px; color:#1f2a44; border-bottom:2px solid #1f2a44; padding-bottom:5px; margin-bottom:10px; font-weight:700; }
.tpl-sidebar td.cv-main .cv-item { margin-bottom:8px; }
.tpl-sidebar td.cv-main .cv-item strong { color:#111; }
.tpl-sidebar td.cv-main .cv-item .meta { color:#7c8aab; font-size:0.82rem; }
.tpl-sidebar td.cv-sidebar .cv-tags span { background:rgba(255,255,255,0.12); padding:4px 12px; border-radius:30px; font-size:0.78rem; margin:0 5px 5px 0; display:inline-block; }

.text-muted { color:#8b9bb8; font-size:0.8rem; }
.mt-1 { margin-top:8px; }

.site-footer { max-width:1440px; margin:30px auto 0; text-align:center; font-size:0.85rem; color:#7c8db8; padding-top:18px; border-top:1px solid #e2e8f2; }
.site-footer a { color:#16213f; font-weight:700; text-decoration:none; }
.site-footer a:hover { text-decoration:underline; }

@media (max-width: 900px) {
    .app { grid-template-columns: 1fr; gap: 20px; }
    .preview-panel { position: static; max-height: none; }
    .form-row { grid-template-columns: 1fr; }
    .lang-selector { top: 16px; right: 16px; }
    .form-panel h2 { margin-right: 100px; }
    .tpl-sidebar td.cv-sidebar, .tpl-sidebar td.cv-main { display:block; width:100%; }
}
@media print {
    .form-panel, .btn-group, .preview-panel h2, .lang-selector, .template-switch, .site-footer { display:none !important; }
    .preview-panel { border:none !important; box-shadow:none !important; padding:0 !important; }
}
</style>
</head>

<div class="app">
    <div class="form-panel">
        <div class="lang-selector">

            <button data-lang="en">EN</button>

        <div class="dynamic-section">

            <div id="certificateContainer"></div>

        <div class="dynamic-section">
            <div class="section-title"><span id="skillTitle">⭐ Bacarıq / Keyfiyyət</span></div>

                    <input type="text" id="skillInput" placeholder="Yeni bacarıq..." />

        <div class="btn-group">
            <button class="btn-word" id="btnWord">📄 Word yüklə</button>
            <button class="btn-pdf" id="btnPdf">📑 PDF yüklə</button>
            <button class="btn-clear" id="btnClear">🗑 Bütün məlumatları təmizlə</button>

        <div class="text-muted mt-1" id="storageInfo">Məlumatlar avtomatik olaraq lokal yaddaşda saxlanılır.</div>
    </div>

    <div class="preview-panel">
        <div class="preview-panel-header">
            <h2 id="previewTitle">👁 Canlı Önizləmə</h2>
            <div class="template-switch">
                <button data-tpl="modern" class="active" id="tplBtnModern">Modern</button>
                <button data-tpl="classic" id="tplBtnClassic">Klassik</button>
                <button data-tpl="sidebar" id="tplBtnSidebar">Creative</button>
            </div>
        </div>
        <div id="cvPreviewWrap"><div id="cvPreview" class="tpl-modern"></div></div>
    </div>
</div>

<div class="site-footer">By <a href="https://instagram.com/s_akhundoff" target="_blank" rel="noopener">@s_akhundoff</a></div>

<script>
const LANG = {
    az: { formTitle:'📝 CV Məlumatları', lblFirstName:'Ad', lblLastName:'Soyad', lblFatherName:'Ata adı (isteğe bağlı)', lblJobTitle:'Vəzifə / Başlıq', lblBirthDate:'Doğum tarixi', lblPhone:'Telefon', lblEmail:'Email', lblAddress:'Ünvan', lblAvatar:'Şəkil yüklə (PNG, JPG)', eduTitle:'🎓 Təhsil', eduAddBtn:'+ Əlavə et', expTitle:'💼 İş təcrübəsi', expAddBtn:'+ Əlavə et', langTitle:'🌐 Dillər', langAddBtn:'+ Əlavə et', certTitle:'📜 Sertifikatlar', certAddBtn:'+ Əlavə et', skillTitle:'⭐ Bacarıq / Keyfiyyət', skillAddBtn:'Əlavə et', skillPlaceholder:'Yeni bacarıq...', btnWord:'📄 Word yüklə', btnPdf:'📑 PDF yüklə', btnClear:'🗑 Bütün məlumatları təmizlə', storageInfo:'Məlumatlar avtomatik olaraq lokal yaddaşda saxlanılır.', previewTitle:'👁 Canlı Önizləmə', cvContact:'Əlaqə', cvEducation:'🎓 Təhsil', cvExperience:'💼 İş təcrübəsi', cvLanguages:'🌐 Dillər', cvCertificates:'📜 Sertifikatlar', cvSkills:'⭐ Bacarıqlar', eduSchool:'Məktəb / Universitet', eduMajor:'İxtisas', eduStart:'Başlama ili', eduEnd:'Bitmə ili', expCompany:'Şirkət adı', expRole:'Vəzifə', expStart:'Başlama', expEnd:'Bitmə', expDesc:'Layihə və ya məsuliyyətlər', langName:'Dil', langLevel:'Səviyyə (məs. Sərbəst)', certName:'Sertifikat adı', certOrg:'Təşkilat', certYear:'İl', tplModern:'Modern', tplClassic:'Klassik', tplSidebar:'Creative', defaultFirst:'Ad', defaultLast:'Soyad', defaultJob:'Vəzifə', generating:'Hazırlanır...' },

};

let currentLang = 'az';
let currentTemplate = 'modern';
window.skills = [];
window.avatarData = null;

function t(){ return LANG[currentLang]; }

function setLanguage(lang){
    currentLang = lang;
    document.querySelectorAll('.lang-selector button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
    updateAllLabels();
    refreshDynamicPlaceholders();
    saveToStorage();
    updatePreview();
}

function setTemplate(tpl){
    currentTemplate = tpl;
    document.querySelectorAll('.template-switch button').forEach(b=>b.classList.toggle('active', b.dataset.tpl===tpl));
    saveToStorage();
    updatePreview();
}

function updateAllLabels(){
    const x = t();
    const map = {formTitle:'formTitle',lblFirstName:'lblFirstName',lblLastName:'lblLastName',lblFatherName:'lblFatherName',lblJobTitle:'lblJobTitle',lblBirthDate:'lblBirthDate',lblPhone:'lblPhone',lblEmail:'lblEmail',lblAddress:'lblAddress',lblAvatar:'lblAvatar',eduTitle:'eduTitle',eduAddBtn:'eduAddBtn',expTitle:'expTitle',expAddBtn:'expAddBtn',langTitle:'langTitle',langAddBtn:'langAddBtn',certTitle:'certTitle',certAddBtn:'certAddBtn',skillTitle:'skillTitle',skillAddBtn:'skillAddBtn',btnWord:'btnWord',btnPdf:'btnPdf',btnClear:'btnClear',storageInfo:'storageInfo',previewTitle:'previewTitle',tplBtnModern:'tplModern',tplBtnClassic:'tplClassic',tplBtnSidebar:'tplSidebar'};
    for (const id in map) { const el = document.getElementById(id); if (el) el.textContent = x[map[id]]; }
    document.getElementById('skillInput').placeholder = x.skillPlaceholder;
}

function refreshDynamicPlaceholders(){
    const x = t();
    document.querySelectorAll('#educationContainer .dynamic-entry').forEach(el=>{
        el.querySelector('.edu-school').placeholder = x.eduSchool;
        el.querySelector('.edu-major').placeholder = x.eduMajor;
        el.querySelector('.edu-start').placeholder = x.eduStart;
        el.querySelector('.edu-end').placeholder = x.eduEnd;

function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderCvHtml(d, tpl){
    const x = t();
    const first = escapeHtml(d.firstName)||x.defaultFirst;
    const last = escapeHtml(d.lastName)||x.defaultLast;
    const father = escapeHtml(d.fatherName);
    const job = escapeHtml(d.jobTitle)||x.defaultJob;
    const avatarImg = d.avatar ? ('<img src="' + d.avatar + '" class="cv-avatar"/>') : '<div class="cv-avatar-placeholder">📷</div>';

    const contactItems = [];
    if (d.phone) contactItems.push('<div class="cv-item">📞 ' + escapeHtml(d.phone) + '</div>');
    if (d.email) contactItems.push('<div class="cv-item">✉️ ' + escapeHtml(d.email) + '</div>');
    if (d.address) contactItems.push('<div class="cv-item">📍 ' + escapeHtml(d.address) + '</div>');
    const contactBlock = contactItems.length ? ('<div class="cv-section"><h4>' + x.cvContact + '</h4>' + contactItems.join('') + '</div>') : '';

    const eduBlock = d.educations.filter(e=>e.school||e.major).length ? ('<div class="cv-section"><h4>' + x.cvEducation + '</h4>' + d.educations.map(e=> (e.school||e.major) ? ('<div class="cv-item"><strong>' + escapeHtml(e.school) + '</strong>' + (e.major?', '+escapeHtml(e.major):'') + ((e.start||e.end)?(' <span class="meta">(' + escapeHtml(e.start) + (e.start&&e.end?' – ':'') + escapeHtml(e.end) + ')</span>'):'') + '</div>') : '').join('') + '</div>') : '';

    const expBlock = d.experiences.filter(e=>e.company||e.role).length ? ('<div class="cv-section"><h4>' + x.cvExperience + '</h4>' + d.experiences.map(e=> (e.company||e.role) ? ('<div class="cv-item"><strong>' + escapeHtml(e.company) + '</strong> – ' + escapeHtml(e.role) + ' ' + ((e.start||e.end)?('<span class="meta">(' + escapeHtml(e.start) + (e.start&&e.end?' – ':'') + escapeHtml(e.end) + ')</span>'):'') + '</div>' + (e.desc?('<div class="meta" style="margin-bottom:6px;">' + escapeHtml(e.desc) + '</div>'):'')) : '').join('') + '</div>') : '';

    const langBlock = d.languages.filter(l=>l.name).length ? ('<div class="cv-section"><h4>' + x.cvLanguages + '</h4>' + d.languages.map(l=> l.name ? ('<div class="cv-item"><strong>' + escapeHtml(l.name) + '</strong> – ' + escapeHtml(l.level) + '</div>') : '').join('') + '</div>') : '';

    const certBlock = d.certificates.filter(c=>c.name).length ? ('<div class="cv-section"><h4>' + x.cvCertificates + '</h4>' + d.certificates.map(c=> c.name ? ('<div class="cv-item"><strong>' + escapeHtml(c.name) + '</strong>' + (c.org?', '+escapeHtml(c.org):'') + (c.year?(' (' + escapeHtml(c.year) + ')'):'') + '</div>') : '').join('') + '</div>') : '';

    const skillBlock = (d.skills||[]).length ? ('<div class="cv-section"><h4>' + x.cvSkills + '</h4><div class="cv-tags">' + d.skills.map(s=>('<span>' + escapeHtml(s) + '</span>')).join('') + '</div></div>') : '';

    if (tpl === 'sidebar'){
        return '<table class="cv-shell" cellpadding="0" cellspacing="0"><tr>' +
            '<td class="cv-sidebar">' + avatarImg +
                '<div class="cv-name">' + first + ' ' + last + (father?(' '+father):'') + '</div>' +
                '<div class="cv-title">' + job + '</div>' +
                contactBlock + langBlock + skillBlock +
            '</td>' +
            '<td class="cv-main">' +
                (d.birthDate?('<div class="meta" style="margin-bottom:10px;">📅 ' + escapeHtml(d.birthDate) + '</div>'):'') +
                expBlock + eduBlock + certBlock +
            '</td>' +
        '</tr></table>';
    }

    if (tpl === 'classic'){
        return '<div class="cv-header">' +
                '<div class="cv-name">' + first + ' ' + last + (father?(' '+father):'') + '</div>' +
                '<div class="cv-title">' + job + '</div>' +
                (d.birthDate?('<div class="meta" style="margin-top:4px;">📅 ' + escapeHtml(d.birthDate) + '</div>'):'') +
            '</div>' +
            '<div class="cv-body">' +
                contactBlock + eduBlock + expBlock + langBlock + certBlock + skillBlock +
            '</div>';
    }

    return '<div class="cv-topbar"></div>' +
        '<div class="cv-header">' + avatarImg +
            '<div>' +
                '<div class="cv-name">' + first + ' ' + last + (father?(' '+father):'') + '</div>' +
                '<div class="cv-title">' + job + '</div>' +
                (d.birthDate?('<div class="meta">📅 ' + escapeHtml(d.birthDate) + '</div>'):'') +
            '</div>' +
        '</div>' +
        '<div class="cv-body">' +
            contactBlock + eduBlock + expBlock + langBlock + certBlock + skillBlock +
        '</div>';
}

/* Mobil-dostu universal fayl yükləmə: bir neçə fallback üsulu sınayır */
function downloadBlob(blob, filename){
    if (window.navigator && window.navigator.msSaveOrOpenBlob) {
        window.navigator.msSaveOrOpenBlob(blob, filename);
        return;
    }
    const url = URL.createObjectURL(blob);
    const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent);
    if (isIOS) {
        window.open(url, '_blank');
        setTimeout(()=>URL.revokeObjectURL(url), 60000);
        return;
    }
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }, 1000);
}

/* ---------- PDF: brauzerin öz "Çap et / PDF kimi saxla" funksiyası (100% mobil-uyğun) ---------- */
function exportPDF(){

    `;
    setTimeout(function(){ window.print(); }, 100);
}

/* ---------- WORD: əsl .docx faylı (docx.js ilə) — Word tətbiqi ilə tam uyğun ---------- */
function buildDocxParagraphs(d, accentHex){
    const { Paragraph, TextRun, HeadingLevel, BorderStyle } = docx;
    const x = t();
    const first = d.firstName || x.defaultFirst;
    const last = d.lastName || x.defaultLast;
    const father = d.fatherName;
    const job = d.jobTitle || x.defaultJob;
    const cleanLabel = (s) => s.replace(/[^\w\sƏəĞğİıÖöŞşÜüÇç]/g,'').trim();

    const paras = [];
    paras.push(new Paragraph({ children: [ new TextRun({ text: first + ' ' + last + (father?(' '+father):''), bold:true, size:44, color:'0C1526' }) ], spacing:{after:60} }));
    paras.push(new Paragraph({ children: [ new TextRun({ text: job, bold:true, size:28, color:accentHex }) ], spacing:{after:160} }));
    if (d.birthDate) paras.push(new Paragraph({ children:[ new TextRun({ text:'Doğum tarixi: ' + d.birthDate, size:22 }) ], spacing:{after:120} }));

    function sectionHeader(label){
        paras.push(new Paragraph({
            children: [ new TextRun({ text: cleanLabel(label), bold:true, size:24, color:accentHex }) ],
            spacing: { before:200, after:100 },
            border: { bottom: { color:'CCCCCC', space:2, style: BorderStyle.SINGLE, size:4 } }
        }));
    }
    function lineP(runs){
        paras.push(new Paragraph({ children: runs, spacing:{after:80} }));
    }

    const contactRuns = [];
    if (d.phone) contactRuns.push('Tel: ' + d.phone);
    if (d.email) contactRuns.push('Email: ' + d.email);
    if (d.address) contactRuns.push('Ünvan: ' + d.address);
    if (contactRuns.length){
        sectionHeader(x.cvContact);
        contactRuns.forEach(c => lineP([ new TextRun({ text:c, size:22 }) ]));
    }

    const edus = d.educations.filter(e=>e.school||e.major);
    if (edus.length){
        sectionHeader(x.cvEducation);
        edus.forEach(e=>{
            const runs = [ new TextRun({ text:e.school, bold:true, size:22 }) ];
            if (e.major) runs.push(new TextRun({ text:', ' + e.major, size:22 }));
            if (e.start||e.end) runs.push(new TextRun({ text:' (' + e.start + (e.start&&e.end?' - ':'') + e.end + ')', size:20, color:'666666' }));
            lineP(runs);
        });
    }

    const exps = d.experiences.filter(e=>e.company||e.role);
    if (exps.length){
        sectionHeader(x.cvExperience);
        exps.forEach(e=>{
            const runs = [ new TextRun({ text:e.company, bold:true, size:22 }), new TextRun({ text:' - ' + e.role, size:22 }) ];
            if (e.start||e.end) runs.push(new TextRun({ text:' (' + e.start + (e.start&&e.end?' - ':'') + e.end + ')', size:20, color:'666666' }));
            lineP(runs);
            if (e.desc) lineP([ new TextRun({ text:e.desc, size:20, color:'555555', italics:true }) ]);
        });
    }

    const langs = d.languages.filter(l=>l.name);
    if (langs.length){
        sectionHeader(x.cvLanguages);
        langs.forEach(l=> lineP([ new TextRun({ text:l.name, bold:true, size:22 }), new TextRun({ text:' - ' + l.level, size:22 }) ]));
    }

    const certs = d.certificates.filter(c=>c.name);
    if (certs.length){
        sectionHeader(x.cvCertificates);
        certs.forEach(c=>{
            const runs = [ new TextRun({ text:c.name, bold:true, size:22 }) ];
            if (c.org) runs.push(new TextRun({ text:', ' + c.org, size:22 }));
            if (c.year) runs.push(new TextRun({ text:' (' + c.year + ')', size:20, color:'666666' }));
            lineP(runs);
        });
    }

    const skills = d.skills||[];
    if (skills.length){
        sectionHeader(x.cvSkills);
        lineP([ new TextRun({ text: skills.join('   •   '), size:22 }) ]);
    }

    return paras;
}

function exportWord(){
    if (typeof docx === 'undefined') {
        alert('Word kitabxanası yüklənmədi. İnternet bağlantınızı yoxlayıb səhifəni yeniləyin.');
        return;
    }
    const d = getFormData();
    const accentHex = currentTemplate === 'sidebar' ? '1F2A44' : (currentTemplate === 'classic' ? '000000' : '2C4DC9');
    const { Document, Packer } = docx;
    const doc = new Document({
        sections: [{
            properties: {},
            children: buildDocxParagraphs(d, accentHex)
        }]
    });
    Packer.toBlob(doc).then(function(blob){
        downloadBlob(blob, 'CV.docx');
    }).catch(function(err){
        console.error(err);
        alert('Word sənədi yaradılarkən xəta baş verdi.');
    });
}
